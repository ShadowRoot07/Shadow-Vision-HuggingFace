name: Shadow-Vision-Guardian-Run

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Shadow-Vision-Assistant
      env:
        # Aquí mapeamos los Secrets de GitHub a variables de entorno del sistema
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        TEXT_MODEL: ${{ secrets.TEXT_MODEL }}
      run: python main.py


name: Shadow-Vision-Guardian-Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      with:
        # Esto asegura que el bot use el token del Action para tener permisos de push
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Shadow-Vision-Assistant
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        VISION_MODEL: ${{ secrets.VISION_MODEL }}
        TEXT_MODEL: ${{ secrets.TEXT_MODEL }}
      run: python main.py

    - name: Commit and Push Report
      run: |
        # Configuramos la identidad del bot
        git config --global user.name "Shadow-Vision-Bot"
        git config --global user.email "bot@shadowroot.tech"
        
        # Verificamos si hay archivos nuevos en la carpeta de reportes
        # El '|| true' evita que el Action falle si no hay cambios
        git add data/reports/*.json || true
        
        # Commit solo si hay cambios reales para evitar errores de 'nothing to commit'
        if git diff --cached --quiet; then
          echo "No se detectaron nuevos reportes para subir."
        else
          git commit -m "Guardian: Nuevo hallazgo detectado [$(date +'%Y-%m-%d %H:%M')]"
          git push origin main
        fi

